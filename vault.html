<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Garage — Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #09090B;
      --cyan: #00C8FF;
      --green: #00FF88;
      --red: #FF4444;
      --amber: #FFB800;
      --sidebar-w: 180px;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(0,200,255,0.15);
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: #fff;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: var(--sidebar-w);
      background: #0A0A0F;
      position: fixed;
      left: 0; top: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      padding: 28px 0 20px;
      z-index: 100;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--cyan);
      padding: 0 18px 28px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-link:hover { color: rgba(255,255,255,0.8); }
    .nav-link.active {
      color: #fff;
      border-left-color: var(--cyan);
      background: rgba(0,200,255,0.06);
    }
    .rally-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      animation: pulse-dot 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 36px 32px;
    }
    .top-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .page-title {
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1px;
    }
    .page-title .solid { color: #fff; }
    .page-title .outline {
      -webkit-text-stroke: 1px #fff;
      color: transparent;
    }
    .add-btn {
      background: var(--cyan);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      margin-top: 8px;
    }

    /* Car group */
    .car-group { margin-bottom: 32px; }
    .car-group-title {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .car-group-title span { color: rgba(255,255,255,0.3); font-weight: 400; font-size: 12px; }

    /* Doc grid */
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .doc-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .doc-card:hover {
      border-color: var(--cyan);
      background: rgba(0,200,255,0.05);
    }
    .doc-icon { font-size: 26px; }
    .doc-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .doc-meta { font-size: 11px; color: rgba(255,255,255,0.4); }
    .doc-date { font-size: 10px; color: rgba(255,255,255,0.3); }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #13131A;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      margin: 16px;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none; border: none;
      color: rgba(255,255,255,0.5);
      font-size: 20px; cursor: pointer;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--cyan); }
    .field select option { background: #13131A; }
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--cyan);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    .modal-error { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; }

    /* MOBILE */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0A0A0F;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 0 14px;
      z-index: 200;
    }
    .bottom-nav-inner { display: flex; justify-content: space-around; }
    .bn-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 10px;
      font-weight: 500;
    }
    .bn-item.active { color: var(--cyan); }
    .bn-icon { font-size: 20px; line-height: 1; }

    .sidebar-identity { margin-top: auto; padding: 14px 14px 10px; border-top: 1px solid rgba(255,255,255,0.06); }
    .identity-card { background: rgba(0,200,255,0.06); border: 1px solid rgba(0,200,255,0.15); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: background 0.2s; }
    .identity-card:hover { background: rgba(0,200,255,0.1); }
    .identity-label { font-size: 9px; font-weight: 700; color: rgba(0,200,255,0.6); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
    .identity-name { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .identity-switch { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 16px 14px 90px; }
      .page-title { font-size: 28px; }
      .top-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
      .add-btn { width: 100%; text-align: center; }
      .doc-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px; }
      .bottom-nav { display: block; }
      .modal { width: calc(100vw - 32px); max-height: calc(100dvh - 60px); border-radius: 20px; }
      select, input, textarea { font-size: 16px !important; }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-logo">The Garage</div>
    <a href="index.html" class="nav-link">🏠 Dashboard</a>
    <a href="collection.html" class="nav-link">🚗 Collection</a>
    <a href="rally.html" class="nav-link">
      <span class="rally-dot"></span> Rally
    </a>
    <a href="events.html" class="nav-link">📅 Events</a>
    <a href="market.html" class="nav-link">🛒 Market</a>
    <a href="analytics.html" class="nav-link">📊 Analytics</a>
    <a href="maintenance.html" class="nav-link">🔧 Maintenance</a>
    <a href="vault.html" class="nav-link active">🔒 Vault</a>
    <div class="sidebar-identity">
      <div class="identity-card" onclick="location.href='index.html'">
        <div class="identity-label">Logged in as</div>
        <div class="identity-name" id="sidebar-identity-name">—</div>
        <div class="identity-switch">tap to switch →</div>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="top-bar">
      <h1 class="page-title">
        <span class="solid">VAULT </span><span class="outline">DOCUMENTS</span>
      </h1>
      <button class="add-btn" onclick="openModal()">+ ADD DOCUMENT</button>
    </div>
    <div id="vault-content">
      <div class="empty-state">Loading...</div>
    </div>
  </main>

  <!-- ADD DOCUMENT MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">ADD DOCUMENT</div>
      <div class="field">
        <label>Select Car</label>
        <select id="f-car">
          <option value="">Loading cars...</option>
        </select>
      </div>
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="f-owner" placeholder="John Smith">
      </div>
      <div class="field">
        <label>Document Name</label>
        <input type="text" id="f-name" placeholder="2024 Lamborghini Title">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="f-type">
          <option value="title">Title</option>
          <option value="insurance">Insurance</option>
          <option value="registration">Registration</option>
          <option value="receipt">Receipt</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Document URL</label>
        <input type="url" id="f-url" placeholder="https://...">
      </div>
      <button class="submit-btn" onclick="addDoc()">SAVE TO VAULT</button>
      <div class="modal-error" id="modal-error"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="index.html" class="bn-item"><span class="bn-icon">🏠</span><span>Home</span></a>
      <a href="collection.html" class="bn-item"><span class="bn-icon">🚗</span><span>Cars</span></a>
      <a href="rally.html" class="bn-item"><span class="bn-icon">📍</span><span>Rally</span></a>
      <a href="events.html" class="bn-item"><span class="bn-icon">📅</span><span>Events</span></a>
      <a href="market.html" class="bn-item"><span class="bn-icon">🛒</span><span>Market</span></a>
    </div>
  </nav>

  <script>
    const { createClient } = supabase
    const db = createClient('https://mjmuqhridetyqrytouhe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qbXVxaHJpZGV0eXFyeXRvdWhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTYxNDQsImV4cCI6MjA5MDU5MjE0NH0.QURk9RdMTpXGcVwjcVGG9XQ5xKktPlYa3L9PBmyoYpw')

    function esc(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }
    function docIcon(type) {
      const map = { title:'📄', insurance:'🛡️', registration:'📋', receipt:'🧾', other:'📎' }
      return map[type] || '📎'
    }
    function formatDate(s) {
      if (!s) return ''
      return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    }

    let cars = []

    async function loadCars() {
      const { data } = await db.from('cars').select('id, owner_name, make, model, year').order('created_at', { ascending: false })
      cars = data || []
      const sel = document.getElementById('f-car')
      if (cars.length === 0) {
        sel.innerHTML = '<option value="">No cars yet</option>'
      } else {
        sel.innerHTML = '<option value="">Select a car...</option>' + cars.map(c =>
          `<option value="${esc(c.id)}">${esc(c.year || '')} ${esc(c.make)} ${esc(c.model)} — ${esc(c.owner_name)}</option>`
        ).join('')
      }
    }

    async function loadDocs() {
      const { data } = await db
        .from('vault_docs')
        .select('*, cars(make, model, owner_name, year)')
        .order('created_at', { ascending: false })

      const content = document.getElementById('vault-content')
      if (!data || data.length === 0) {
        content.innerHTML = '<div class="empty-state">NO DOCUMENTS IN THE VAULT.</div>'
        return
      }

      // Group by car_id
      const groups = {}
      data.forEach(d => {
        const carKey = d.car_id || 'none'
        if (!groups[carKey]) groups[carKey] = { car: d.cars, docs: [] }
        groups[carKey].docs.push(d)
      })

      content.innerHTML = Object.entries(groups).map(([, group]) => {
        const carLabel = group.car
          ? `${esc(group.car.year || '')} ${esc(group.car.make)} ${esc(group.car.model)}`
          : 'Unknown Car'
        const ownerLabel = group.car ? esc(group.car.owner_name) : ''
        const docsHtml = group.docs.map(d => `
          <a href="${esc(d.doc_url)}" target="_blank" rel="noopener noreferrer" class="doc-card">
            <div class="doc-icon">${docIcon(d.doc_type)}</div>
            <div class="doc-name">${esc(d.doc_name)}</div>
            <div class="doc-meta">${esc(d.owner_name || ownerLabel)}</div>
            <div class="doc-date">${formatDate(d.created_at)}</div>
          </a>
        `).join('')
        return `
          <div class="car-group">
            <div class="car-group-title">
              ${carLabel}
              <span>${ownerLabel}</span>
            </div>
            <div class="doc-grid">${docsHtml}</div>
          </div>
        `
      }).join('')
    }

    loadCars()
    loadDocs()

    function openModal() {
      document.getElementById('modal').classList.add('open')
      document.getElementById('modal-error').textContent = ''
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('open')
    }
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal()
    })

    async function addDoc() {
      const carId = document.getElementById('f-car').value
      const owner = document.getElementById('f-owner').value.trim()
      const name = document.getElementById('f-name').value.trim()
      const type = document.getElementById('f-type').value
      const url = document.getElementById('f-url').value.trim()
      const errEl = document.getElementById('modal-error')
      errEl.textContent = ''

      if (!name || !url) {
        errEl.textContent = 'Document name and URL are required.'
        return
      }
      try { new URL(url) } catch {
        errEl.textContent = 'Please enter a valid URL.'
        return
      }

      const { error } = await db.from('vault_docs').insert({
        car_id: carId || null,
        owner_name: owner || null,
        doc_name: name,
        doc_type: type,
        doc_url: url
      })

      if (error) { errEl.textContent = 'Error: ' + error.message; return }
      closeModal()
      loadDocs()
    }

    document.getElementById('sidebar-identity-name').textContent = localStorage.getItem('garage_owner_name') || 'Guest';
  </script>
</body>
</html>
